name: Bug report
description: Report a reproducible local-only problem without private data.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Do not include credentials, account exports, analytics, private images, or personal information."
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Use synthetic data only.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
    validations:
      required: true
